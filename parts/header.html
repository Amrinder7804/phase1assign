<!--
  CSS-only sidebar toggle: checking this hidden input via <label for="phase1-nav-toggle">
  triggers the sidebar slide-in and overlay using :checked sibling selectors in style.css.
  No JavaScript is required for open/close. The overlay label below closes the menu on
  outside-click by unchecking the same input.
-->
<input type="checkbox" id="phase1-nav-toggle" class="phase1-nav-checkbox" aria-hidden="true">
<label for="phase1-nav-toggle" class="phase1-overlay" aria-hidden="true"></label>

<aside class="phase1-sidebar" aria-label="Site navigation">
	<div class="phase1-sidebar-head">
		<a href="/" class="phase1-sidebar-logo">
			<span class="phase1-sidebar-brand">Phase1 Grocery</span>
		</a>
		<!-- close btn only visible on mobile -->
		<label for="phase1-nav-toggle" class="phase1-sidebar-close" aria-label="Close menu">&times;</label>
	</div>
	<nav class="phase1-sidebar-nav">
		<ul>
			<li><a href="/"><span class="nav-icon">🏠</span> Home</a></li>
			<li><a href="/shop"><span class="nav-icon">🛍️</span> Shop</a></li>
			<li><a href="/post"><span class="nav-icon">📝</span> Blog</a></li>
			<li><a href="/about"><span class="nav-icon">ℹ️</span> About</a></li>
			<li><a href="/contact"><span class="nav-icon">✉️</span> Contact</a></li>
			<li><a href="/cart"><span class="nav-icon">🛒</span> Cart</a></li>
			<li><a href="/my-account"><span class="nav-icon">👤</span> Account</a></li>
		</ul>
	</nav>
</aside>
